name: Auto Deploy to AWS EC2

on:
  push:
    branches:
      - main # Change this if your default branch is 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Navigate to the project directory on your EC2 instance
            # Ensure the folder name matches exactly what you cloned it as
            cd ~/Golf-Charity-Platform
            
            # Pull the latest changes from the main branch
            git pull origin main
            
            # Rebuild and restart the docker containers in detached mode
            docker compose up -d --build
