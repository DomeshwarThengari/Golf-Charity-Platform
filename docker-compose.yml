services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: golf_charity_server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    # Uncomment the below lines if you have a .env file you want Docker to use
    # env_file:
    #   - ./server/.env
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: golf_charity_client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
